# Production Deployment Workflow
#
# Triggers on merge to main. Deploys to production using OIDC keyless
# authentication — no long-lived credentials stored anywhere.
#
# SETUP REQUIRED:
# 1. Create an IAM role in AWS that trusts GitHub Actions via OIDC:
#    https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
# 2. Set the role ARN in GitHub repo Settings > Secrets > AWS_DEPLOY_ROLE_ARN
# 3. Set AWS_REGION to your target region
# 4. Replace the "Deploy" step with your actual deployment commands

name: Deploy to Production

on:
  push:
    branches: [main]

# Required for OIDC token generation
permissions:
  id-token: write    # Request the OIDC JWT token
  contents: read     # Read repository contents

jobs:
  # ── Guard: only deploy if guardrails pass ────────────────────────────────────
  guardrails:
    name: Guardrail Check
    uses: ./.github/workflows/guardrails.yml  # Reuse the guardrails workflow

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [guardrails]                        # Never deploy if guardrails fail
    environment: production                    # Requires environment protection rules in GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── OIDC Keyless Authentication ──────────────────────────────────────────
      # No long-lived credentials stored anywhere.
      # GitHub Actions requests a short-lived token from AWS at runtime.
      # The token expires when the job ends — nothing to rotate, nothing to leak.
      - name: Configure AWS credentials (keyless OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
          role-session-name: GitHubActions-${{ github.run_id }}

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ vars.ECR_REPOSITORY }}:${{ github.sha }} \
            --tag ${{ vars.ECR_REPOSITORY }}:latest \
            .

      - name: Push to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin ${{ vars.ECR_REGISTRY }}
          docker push ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
          docker push ${{ vars.ECR_REPOSITORY }}:latest

      # ── Deploy ───────────────────────────────────────────────────────────────
      # Replace this step with your actual deployment mechanism.
      # Examples: ECS update-service, Lambda update-function-code,
      #           kubectl set image, heroku container:push, fly deploy
      - name: Deploy to ECS
        id: deploy
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment \
            --query 'service.deployments[0].status' \
            --output text

      # ── Verify ───────────────────────────────────────────────────────────────
      - name: Verify deployment
        run: |
          # Wait for ECS service to stabilize (adjust timeout as needed)
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}
          echo "✅ Deployment stable"

      # ── Rollback on failure ───────────────────────────────────────────────────
      - name: Rollback on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        run: |
          echo "🚨 Deployment failed — initiating rollback"
          # Re-deploy the previous task definition revision
          PREVIOUS_TASK_DEF=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query 'services[0].taskDefinition' \
            --output text | sed 's/:[0-9]*$/:/' | xargs -I{} echo "{}$(aws ecs describe-task-definition --task-definition {} --query 'taskDefinition.revision' --output text | awk '{print $1 - 1}')")
          echo "Rolling back to: $PREVIOUS_TASK_DEF"
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition "$PREVIOUS_TASK_DEF"
