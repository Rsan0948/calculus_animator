# Scheduled Maintenance Workflow
#
# Runs automated maintenance tasks on a schedule.
# No CI/CD — this is for ongoing health monitoring.

name: Scheduled Maintenance

on:
  schedule:
    # Weekly dependency scan — every Monday at 09:00 UTC
    # Cron format: minute hour day-of-month month day-of-week
    - cron: '0 9 * * 1'

    # Monthly DORA metrics — first day of each month at 08:00 UTC
    - cron: '0 8 1 * *'

    # Nightly full audit — uncomment to enable (can be noisy)
    # - cron: '0 2 * * *'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all scheduled tasks now'
        type: boolean
        default: true

jobs:
  # ── Weekly: Dependency Vulnerability Scan ────────────────────────────────────
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    # Run on schedule OR when manually triggered
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi

      - name: Supply chain scan (pip-audit)
        run: |
          python guardrails/check_supply_chain.py
        continue-on-error: true  # Report but don't fail — alert separately

      - name: Check dependency age
        run: |
          python guardrails/check_dependency_age.py
        continue-on-error: true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🔐 Dependency Security Alert — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Automated Dependency Scan Found Issues',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '### Action Required',
              '1. Review the scan output in the failed run above',
              '2. Update vulnerable packages: `pip install --upgrade <package>`',
              '3. Pin safe versions in `pyproject.toml`',
              '4. Re-run the workflow to confirm fixes',
              '',
              '_This issue was automatically created by the scheduled dependency scan._',
            ].join('\n');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependencies'],
            });

  # ── Monthly: DORA Metrics Report ─────────────────────────────────────────────
  dora-metrics:
    name: DORA Metrics Report
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 1 * *'

    steps:
      - name: Checkout code (with full history for DORA metrics)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for accurate metrics

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate DORA metrics (last 30 days)
        id: dora
        run: |
          python metrics/dora.py --days 30 --output markdown > /tmp/dora_30d.md
          python metrics/dora.py --days 90 --output markdown > /tmp/dora_90d.md
          echo "Generated DORA metrics"
          cat /tmp/dora_30d.md

      - name: Post DORA metrics as GitHub issue comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dora30 = fs.readFileSync('/tmp/dora_30d.md', 'utf8');
            const dora90 = fs.readFileSync('/tmp/dora_90d.md', 'utf8');
            const body = [
              '## Monthly DORA Metrics Report',
              '',
              '### Last 30 Days',
              dora30,
              '',
              '### Last 90 Days (trend)',
              dora90,
              '',
              '_Auto-generated by scheduled workflow. See [DORA methodology](docs/RESEARCH.md) for threshold definitions._',
            ].join('\n');

            // Find or create the monthly DORA tracking issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dora-metrics',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Comment on the existing tracking issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
              });
            } else {
              // Create a new tracking issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '📊 DORA Metrics Tracking',
                body,
                labels: ['dora-metrics'],
              });
            }

